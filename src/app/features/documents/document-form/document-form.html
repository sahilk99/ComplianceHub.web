<div class="document-form-container">
  <div class="form-card">
    <h2 class="form-title">{{ isEditMode ? 'Edit Document' : 'Create New Document' }}</h2>

    <form [formGroup]="documentForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="title">Title *</label>
        <input type="text" id="title" formControlName="title" class="form-control"
               [ngClass]="{ 'is-invalid': f['title'].touched && f['title'].invalid }">
        <div class="error-msg" *ngIf="f['title'].touched && f['title'].errors?.['required']">Title is required.</div>
        <div class="error-msg" *ngIf="f['title'].touched && f['title'].errors?.['maxlength']">Title cannot exceed 200 characters.</div>
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" formControlName="category" class="form-control"
                [ngClass]="{ 'is-invalid': f['category'].touched && f['category'].invalid }">
          <option value="" disabled>Select Category</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
        <div class="error-msg" *ngIf="f['category'].touched && f['category'].errors?.['required']">Category is required.</div>
      </div>

      <div class="form-group">
        <label for="fileUrl">File URL *</label>
        <input type="text" id="fileUrl" formControlName="fileUrl" class="form-control" placeholder="https://..."
               [ngClass]="{ 'is-invalid': f['fileUrl'].touched && f['fileUrl'].invalid }">
        <div class="error-msg" *ngIf="f['fileUrl'].touched && f['fileUrl'].errors?.['required']">File URL is required.</div>
        <div class="error-msg" *ngIf="f['fileUrl'].touched && f['fileUrl'].errors?.['pattern']">Must be a valid URL starting with http:// or https://</div>
      </div>

      <div class="form-group">
        <label for="departmentId">Department *</label>
        <select id="departmentId" formControlName="departmentId" class="form-control"
                [ngClass]="{ 'is-invalid': f['departmentId'].touched && f['departmentId'].invalid }">
          <option value="" disabled>Select Department</option>
          <option *ngFor="let dept of departments" [value]="dept.id">{{ dept.name }}</option>
        </select>
        <div class="error-msg" *ngIf="f['departmentId'].touched && f['departmentId'].errors?.['required']">Department is required.</div>
      </div>

      <div class="form-group">
        <label for="expiryDate">Expiry Date *</label>
        <input type="date" id="expiryDate" formControlName="expiryDate" class="form-control"
               [ngClass]="{ 'is-invalid': f['expiryDate'].touched && f['expiryDate'].invalid }">
        <div class="error-msg" *ngIf="f['expiryDate'].touched && f['expiryDate'].errors?.['required']">Expiry Date is required.</div>
        <div class="error-msg" *ngIf="f['expiryDate'].touched && f['expiryDate'].errors?.['futureDate']">Expiry Date must be in the future.</div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" routerLink="/documents">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Saving...' : 'Save Document' }}
        </button>
      </div>

    </form>
  </div>
</div>
